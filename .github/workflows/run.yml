name: Auto Gift

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions: # 파일 커밋을 위한 권한 추가
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install undetected-chromedriver selenium requests

      - name: Run script with display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python main.py

      # 변경된 used_codes.json을 레포지토리에 저장
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update used_codes.json [skip ci]"
          file_pattern: 'used_codes.json'

      - name: Upload screenshots
        if: always() # 실패해도 스크린샷 업로드
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
